quarkus.http.port=9999
quarkus.dapr.workflow.enabled=true
# Langchain4j OpenAI Configuration
#quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:test-key}
#quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
#quarkus.langchain4j.openai.timeout=30s

quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:test-key}
quarkus.langchain4j.anthropic.chat-model.model-name=claude-haiku-4-5
quarkus.langchain4j.anthropic.timeout=30s

# Remote Agent URLs
cooking.agent.url=${COOKING_AGENT_URL:http://localhost:8087}
delivery.agent.url=${DELIVERY_AGENT_URL:http://localhost:8089}

quarkus.langchain4j.mcp.pizza-mcp.transport-type=http
quarkus.langchain4j.mcp.pizza-mcp.url=${PIZZA_MCP_URL:http://localhost:8086/mcp/sse}
quarkus.langchain4j.mcp.pizza-mcp.log-requests=false
quarkus.langchain4j.mcp.pizza-mcp.log-responses=false
quarkus.langchain4j.mcp.pizza-mcp.tool-execution-timeout=60s
# Logging
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false

