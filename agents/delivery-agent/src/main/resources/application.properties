quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:test-key}
quarkus.langchain4j.anthropic.chat-model.model-name=claude-haiku-4-5
quarkus.langchain4j.anthropic.timeout=30s

quarkus.langchain4j.ai-service.max-tool-executions=40

# Bikes Service URL
bikes.service.url=${BIKES_SERVICE_URL:http://localhost:8088}

# Path to bikes skill scripts
bikes.skill.scripts.path=${BIKES_SKILL_SCRIPTS_PATH:skills/bikes/scripts}

# Store Service REST Client
quarkus.rest-client.store-api.url=${STORE_SERVICE_URL:http://localhost:8080}
quarkus.rest-client.store-api.scope=jakarta.inject.Singleton

