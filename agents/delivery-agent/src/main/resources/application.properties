quarkus.http.port=8089
# Langchain4j OpenAI Configuration
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:test-key}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.timeout=30s
quarkus.langchain4j.ai-service.max-tool-executions=40

# Bikes Service URL
bikes.service.url=${BIKES_SERVICE_URL:http://localhost:8088}

# Path to bikes skill scripts
bikes.skill.scripts.path=${BIKES_SKILL_SCRIPTS_PATH:skills/bikes/scripts}
