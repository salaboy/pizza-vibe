# MCP Server Configuration
quarkus.http.port=8086
quarkus.mcp.server.server-info.name=Pizza Vibe MCP Server
#quarkus.mcp.server.traffic-logging.enabled=true
#quarkus.mcp.server.traffic-logging.text-limit=100

# Inventory Service REST Client
quarkus.rest-client.inventory-api.url=${INVENTORY_SERVICE_URL:http://localhost:8084}
quarkus.rest-client.inventory-api.scope=jakarta.inject.Singleton

# Oven Service REST Client
quarkus.rest-client.oven-api.url=${OVEN_SERVICE_URL:http://localhost:8085}
quarkus.rest-client.oven-api.scope=jakarta.inject.Singleton

# Store Service REST Client
quarkus.rest-client.store-api.url=${STORE_SERVICE_URL:http://localhost:8080}
quarkus.rest-client.store-api.scope=jakarta.inject.Singleton

# Drinks Stock Service REST Client
quarkus.rest-client.drinks-stock-api.url=${DRINKS_STOCK_SERVICE_URL:http://localhost:8090}
quarkus.rest-client.drinks-stock-api.scope=jakarta.inject.Singleton

