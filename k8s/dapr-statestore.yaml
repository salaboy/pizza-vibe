apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.postgresql
  version: v2
  metadata:
    - name: connectionString
      value: "host=postgresql.default.svc.cluster.local user=postgres password=postgres port=5432 database=dapr_store sslmode=disable"
    - name: actorStateStore
      value: "true"