apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-mcp
  labels:
    app: pizza-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-mcp
  template:
    metadata:
      labels:
        app: pizza-mcp
      annotations:
        instrumentation.opentelemetry.io/inject-java: "opentelemetry/instrumentation"
    spec:
      containers:
        - name: pizza-mcp
          image: pizza-vibe-pizza-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          env:
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory:8084"
            - name: OVEN_SERVICE_URL
              value: "http://oven:8085"
            - name: STORE_SERVICE_URL
              value: "http://store:8080"
            - name: DRINKS_STOCK_SERVICE_URL
              value: "http://drinks-stock:8090"
            - name: OTEL_INSTRUMENTATION_NETTY_ENABLED
              value: "false"
          livenessProbe:
            httpGet:
              path: /q/health
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-mcp
  labels:
    app: pizza-mcp
spec:
  selector:
    app: pizza-mcp
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
  type: ClusterIP