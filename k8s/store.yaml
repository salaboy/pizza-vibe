apiVersion: apps/v1
kind: Deployment
metadata:
  name: store
  labels:
    app: store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store
  template:
    metadata:
      labels:
        app: store
    spec:
      containers:
        - name: store
          image: pizza-vibe-store:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: OVEN_SERVICE_URL
              value: "http://oven:8085"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory:8084"
            - name: BIKES_SERVICE_URL
              value: "http://bikes:8088"
            - name: DRINKS_STOCK_SERVICE_URL
              value: "http://drinks-stock:8090"
            - name: STORE_MGMT_AGENT_URL
              value: "http://store-mgmt-agent:9999"
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgresql.default.svc.cluster.local:5432/dapr_store?sslmode=disable"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: store
  labels:
    app: store
spec:
  selector:
    app: store
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
