apiVersion: apps/v1
kind: Deployment
metadata:
  name: bikes
  labels:
    app: bikes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bikes
  template:
    metadata:
      labels:
        app: bikes
      annotations:
        instrumentation.opentelemetry.io/inject-go: "opentelemetry/instrumentation"
        instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/app/bikes"
    spec:
      containers:
        - name: bikes
          image: pizza-vibe-bikes:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          env:
            - name: PORT
              value: "8088"
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bikes
  labels:
    app: bikes
spec:
  selector:
    app: bikes
  ports:
    - port: 8088
      targetPort: 8088
      protocol: TCP
  type: ClusterIP
